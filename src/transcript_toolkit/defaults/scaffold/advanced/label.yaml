# Advanced settings for `toolkit label`. You normally don't touch these.

prompt: label_clips.md            # in prompts/
verbosity: low
batch_threshold_tokens: 10000     # consecutive clips are batched per call up to this budget
max_workers: 8
poll_interval_s: 4
max_total_wait_s: 1800
batch_poll_interval_s: 30       # --batch: how often to check the Batch API job
batch_max_total_wait_s: 86400   # --batch: give up polling after this; re-run to resume
